name: Deploy to Neocities

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Neocities does not need the special GitHub Pages permissions
permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kiln
        run: |
          # Download the latest Linux binary
          curl -L -o kiln https://github.com/otaleghani/kiln/releases/latest/download/kiln_linux_amd64

          # Make it executable
          chmod +x kiln

      - name: Build Site
        run: |
            mkdir -p .public
            ./kiln generate \ 
                --input "./WhimsySightings" \ 
                --output "./public" \
                --url "https://whimsyscoundrel.neocities.org" \
                --name "Whimsy Scoundrel" \
                --theme "cyberdream"

      - name: Deploy to Neocities
        uses: bcomnes/deploy-to-neocities@v1
        with:
          # Add this secret in: Settings → Secrets and variables → Actions
          # Name: NEOCITIES_API_TOKEN   Value: your Neocities API key
          api_token: ${{ secrets.NEOCITIES_API_TOKEN }}
          dist_dir: public
          cleanup: true
# Note:  make cleanup false to leave old files put and rely on other action in repo to clean it once a week
# making it true seems to make neocities angry